name: Deploy Homepage

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/mkjems/homepage
  VPS_APP_DIR: /opt/homepage
  VPS_LOCAL_URL: http://127.0.0.1:8082/
  PUBLIC_URL: https://mkjems.dk/

concurrency:
  group: homepage-deploy
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build static site
        run: npm run build

      - name: Validate static site files
        run: |
          test -f Dockerfile
          test -f src/index.html
          test -f dist/index.html

  build:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build static site
        run: npm run build

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Check deployment secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          test -n "$VPS_HOST" || (echo "::error::Missing repository secret VPS_HOST" && exit 1)
          test -n "$VPS_USER" || (echo "::error::Missing repository secret VPS_USER" && exit 1)
          test -n "$VPS_SSH_KEY" || (echo "::error::Missing repository secret VPS_SSH_KEY" && exit 1)

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            cd ${{ env.VPS_APP_DIR }}
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
            curl -fsSI ${{ env.VPS_LOCAL_URL }}
            curl -fsSI ${{ env.PUBLIC_URL }}
